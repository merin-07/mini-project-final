<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Salary & Budget Setup - Budget Manager</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}
.box {
    background: white;
    padding: 40px;
    border-radius: 20px;
    width: 400px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}
.box h2 { margin-bottom: 8px; color: #333; font-size: 1.6em; }
.box p { color: #666; margin-bottom: 25px; font-size: 0.9em; }
.input-group {
    text-align: left;
    margin: 12px 0;
}
.input-group label {
    display: block;
    font-weight: bold;
    color: #555;
    margin-bottom: 5px;
    font-size: 0.9em;
}
input {
    width: 100%;
    padding: 13px 15px;
    border: 1.5px solid #ddd;
    border-radius: 10px;
    font-size: 15px;
    transition: border-color 0.3s;
    box-sizing: border-box;
}
input:focus { outline: none; border-color: #4facfe; }
button {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    margin-top: 15px;
    transition: opacity 0.3s;
}
button:hover { opacity: 0.9; }
.error { color: #e74c3c; font-size: 0.85em; margin-top: 10px; display: none; }
</style>
</head>
<body>
<div class="box">
    <h2>💰 Almost There!</h2>
    <p>Set your monthly salary and spending budget to get started</p>
    <div class="input-group">
        <label>Monthly Salary (₹)</label>
        <input type="number" id="salary" placeholder="e.g. 50000" step="0.01" min="0">
    </div>
    <div class="input-group">
        <label>Monthly Budget Limit (₹)</label>
        <input type="number" id="budget" placeholder="e.g. 30000" step="0.01" min="0">
    </div>
    <div class="error" id="errorMsg"></div>
    <button onclick="save()">Save & Go to Dashboard →</button>
</div>
<script>
// Auth guard — only accessible after registering
const user = JSON.parse(localStorage.getItem('user'));
if (!user) {
    window.location.href = 'Login.html';
}

function save() {
    const salary = parseFloat(document.getElementById('salary').value);
    const budget = parseFloat(document.getElementById('budget').value);
    const errorMsg = document.getElementById('errorMsg');

    if (!salary || !budget || salary <= 0 || budget <= 0) {
        errorMsg.textContent = 'Please enter valid salary and budget amounts.';
        errorMsg.style.display = 'block';
        return;
    }

    user.salary = salary;
    user.budget = budget;
    localStorage.setItem('user', JSON.stringify(user));
    localStorage.setItem('loggedIn', 'true');

    window.location.href = 'budget.html';
}
</script>
</body>
</html>
