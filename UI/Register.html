<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - Budget Manager</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #203e91, #e8edff);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}
.box {
    background: rgba(255, 255, 255, 0.88);
    padding: 40px;
    border-radius: 20px;
    width: 380px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}
.box h2 { margin-bottom: 8px; color: #333; font-size: 1.8em; }
.box p { color: #666; margin-bottom: 25px; font-size: 0.9em; }
input {
    width: 100%;
    padding: 13px 15px;
    margin: 8px 0;
    border: 1.5px solid #ddd;
    border-radius: 10px;
    font-size: 15px;
    transition: border-color 0.3s;
    box-sizing: border-box;
}
input:focus { outline: none; border-color: #1e40af; }
button {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #1e3a8a, #1e40af);
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
    transition: opacity 0.3s;
}
button:hover { opacity: 0.9; }
a { display: block; margin-top: 20px; color: #1e40af; text-decoration: none; font-size: 0.9em; }
a:hover { text-decoration: underline; }
.error { color: #e74c3c; font-size: 0.85em; margin-top: 8px; display: none; }
</style>
</head>
<body>
<div class="box">
    <h2>🧾 Create Account</h2>
    <p>Start tracking your expenses today</p>
    <input type="text" id="name" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">
    <div class="error" id="errorMsg"></div>
    <button onclick="register()">Create Account</button>
    <a href="Login.html">Already have an account? Sign In</a>
</div>
<script>
function register() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');

    if (!name || !email || !password) {
        errorMsg.textContent = 'All fields are mandatory. Please fill in all fields.';
        errorMsg.style.display = 'block';
        return;
    }

    // Email validation regex
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        errorMsg.textContent = 'Please enter a valid email address.';
        errorMsg.style.display = 'block';
        return;
    }

    const user = { name, email, password };
    localStorage.setItem('user', JSON.stringify(user));
    // Don't set loggedIn here — user must go through salary setup first
    window.location.href = 'salary_budget.html';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') register(); });
</script>
</body>
</html>
